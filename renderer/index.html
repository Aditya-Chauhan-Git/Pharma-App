<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">

    <script type="module" src="./js/search.js" defer></script>
    <script type="module" src="./js/receipt.js" defer></script>
    <!-- <script type="module" src="./js/summary.js"></script> -->

</head>

<body>
    <aside>
        <div class="brand">
            <div class="brand__logo">M</div>
            <div class="brand__name">
                <div class="title">MPharma</div>
                <div class="subtitle">Inventory System</div>
            </div>
        </div>
        <nav class="nav">
            <ul class="nav__list">
                <li class="nav__item"><a href="index.html" class="nav-link">🏠 Home</a></li>
                <li class="nav__item"><a href="upload.html" class="nav-link">📤 Upload</a></li>
                <li class="nav__item"><a href="" class="nav-link">📋 History</a></li>
            </ul>
        </nav>
    </aside>
    <header class="surface">
        <h1 class="header__title">Sale Receipt</h1>
        <div class="current-date">8 Jun 2026</div>
    </header>
    <main>
        <div class="search" id="search">
            <input class="search-bar" type="text" id="medicine-searchbar" autocomplete="off"
                placeholder="🔍 Search medicine name or brand...">
            <div id="suggestions" class="suggestions surface">
            </div>
        </div>
        <table id="receipt-table">

            <thead id="receipt-header">
                <tr>
                    <th>Medicine</th>
                    <th>QTY</th>
                    <th>Unit Price</th>
                    <th>Discount</th>
                    <th>Amount</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="receipt-body">
            </tbody>

        </table>
    </main>
    <section class="receipt-total">
        <div class="total__summary">
            <div class="qty-details"><span id="total-medicines"></span>medicines · <span id="total-units"></span> units</div>
            <div>Total: <span id="total-amount"></span></div>
        </div>

        <div class="receipt-action">
            <button class="sell-btn" id="sell-btn">✓ Sell</button>
        </div>
    </section>
    <footer></footer>
</body>

</html>
